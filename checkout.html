<!DOCTYPE html>
<html lang="vi" data-theme="royal-red">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Shop Làng Việt</title>
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body data-page="checkout">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="index.html" class="brand">
        <div class="brand-logo">
          <img src="assets/logo.webp" alt="Logo Shop Làng Việt" />
        </div>
        <div>
          <div class="brand-title">Shop Làng Việt</div>
          <div class="brand-sub">Shop dịch vụ Roblox tổng hợp</div>
        </div>
      </a>

      <nav class="nav-links">
        <a href="index.html">Trang chủ</a>
        <a href="wallet.html">Nạp tiền</a>
        <a href="contact.html">Liên hệ hỗ trợ</a>
      </nav>

      <div class="top-actions">
        <a class="icon-link wallet-pill" href="wallet.html">
          💰 <span data-wallet-balance>0đ</span>
        </a>
        <a class="icon-link" href="cart.html">🛒 <span data-cart-count>0</span></a>
        <div id="userArea"></div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section class="page-hero">
        <span class="kicker">Checkout</span>
        <h1 class="title-lg">Đặt dịch vụ / thanh toán</h1>
        <p class="text">
          Nhập đầy đủ thông tin để hệ thống tạo đơn và gửi đơn sang Discord staff.
        </p>
      </section>

      <div id="checkoutView"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Shop Làng Việt. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
